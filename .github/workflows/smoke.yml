name: smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shell syntax
        run: |
          bash -n ./bin/multiplus
          bash -n ./install.sh

      - name: Smoke test
        run: bash ./tests/smoke.sh
